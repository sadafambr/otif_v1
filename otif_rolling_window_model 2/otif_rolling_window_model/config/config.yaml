database:
  server: "SDVWEDWSHSS01"
  name: "SupplyChainAnalyticsDB"
  driver: "ODBC Driver 17 for SQL Server"

threshold_policy:
  beta: 2.5
  min_miss_precision: 0.50
  clamp_low: 0.05
  clamp_high: 0.40
  smooth_alpha: 0.3
  fallback_threshold: 0.34
  guardrail_max_step: 0.05
  min_samples: 2000
  min_miss_count: 200
  fallback_mode: "best_fbeta"

model_params:
  n_estimators: 900
  learning_rate: 0.05
  num_leaves: 31
  max_depth: -1
  min_child_samples: 600
  subsample: 0.7
  colsample_bytree: 0.7
  reg_lambda: 5.0

features:
  cat_cols:
    - "Plant"
    - "Material"
    - "Ship_To"
    - "Division of Business Name"
    - "State - Province"
  date_cols:
    - "SO create date"
    - "Mat_Avl_Date_OTIF"
    - "Requested Delivery Date"
  target_raw: "OTIF_HIT/MISS"
  target_col: "otif_numeric"
  split_date_col: "Requested Delivery Date"

paths:
  raw_data: "data/raw"
  models: "models/month_wise"
